# 双碳领域知识库 · GitHub Pages 自动部署
# 推送 main 分支后，GitHub Actions 自动把本仓库（站点根目录）发布为静态站点。
# 仓库设置 → Pages → Source 选择 "GitHub Actions" 即可。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 站点根目录即本仓库根（digest/），所有 .html 与 kb/ 一并发布
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
